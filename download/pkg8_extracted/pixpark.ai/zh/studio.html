(() => {
  const themeKey = "theme";
  const normalizeTheme = (value) =>
    value === "light" || value === "dark" || value === "system" ? value : null;
  const normalizeResolvedTheme = (value) =>
    value === "light" || value === "dark" ? value : null;
  const readThemeFromCookieString = (cookieString) => {
    if (!cookieString) return null;
    const match = cookieString.match(
      new RegExp('(?:^|;\\s*)' + themeKey + '=(light|dark|system)(?:;|$)')
    );
    if (!match) return null;
    return normalizeTheme(match[1]);
  };
  const resolveSystemThemePreference = () =>
    window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  const resolveThemePreference = ({ storageValue, cookieString, attributeTheme, fallbackTheme = "system" }) => {
    const storedTheme = normalizeTheme(storageValue);
    if (storedTheme) return storedTheme;

    const cookieTheme = readThemeFromCookieString(cookieString);
    if (cookieTheme) return cookieTheme;

    const resolvedAttributeTheme = normalizeResolvedTheme(attributeTheme);
    if (resolvedAttributeTheme) return resolvedAttributeTheme;

    return fallbackTheme;
  };
  const persistThemePreference = (theme) => {
    try {
      window.localStorage.setItem(themeKey, theme);
    } catch {}
    document.cookie = `${themeKey}=${theme}; Path=/; Max-Age=31536000; SameSite=Lax`;
  };

  let storageValue = null;
  try {
    storageValue = window.localStorage.getItem(themeKey);
  } catch {}

  const nextTheme = resolveThemePreference({
    storageValue,
    cookieString: document.cookie,
    attributeTheme: document.documentElement.getAttribute("data-theme"),
    fallbackTheme: "system",
  });
  const resolvedTheme = nextTheme === "system" ? resolveSystemThemePreference() : nextTheme;
  document.documentElement.setAttribute("data-theme", resolvedTheme);
  persistThemePreference(nextTheme);
})();
