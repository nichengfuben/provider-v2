  <script>
    try {
      window.mainBroadcastChannel = new BroadcastChannel('main');
    } catch(e) {
      console.error("browser doesn't support BroadcastChannel", e);
    }

    function setSubChannelName() {
      let scn = prompt(`Choose a gallery name to send your images to. If you want your own private gallery, choose a gallery name that's long enough that others won't guess it.\n\nThe gallery name may include lowercase letters, numbers, and hyphens:`, localStorage.subChannelName);
      if(scn !== null && scn.trim() === '') {
        scn = 'public';
      }
      if(scn) {
        scn = scn.trim();
        if(/^[a-z0-9\-]+$/.test(scn)) {
          localStorage.subChannelName = scn;
          updateSubChannelNameUi();
        } else {
          alert("The gallery name must be made of lowercase letters, numbers, and hyphens only.");
        }
      }
    }
    if(!localStorage.subChannelName) {
      localStorage.subChannelName = "public";
    }
    function updateSubChannelNameUi() {
      if(localStorage.subChannelName.length > 10) {
        document.querySelector("#subChannelNameEl").style.fontSize = "60%";
      } else {
        document.querySelector("#subChannelNameEl").style.fontSize = "80%";
      }
      document.querySelector("#subChannelNameEl").title = localStorage.subChannelName;

      document.querySelector("#subChannelNameTextEl").textContent = localStorage.subChannelName.length > 12 ? localStorage.subChannelName.slice(0,12)+'…' : localStorage.subChannelName;
    }
    updateSubChannelNameUi();
  </script>

  <script>

    setInterval(() => {

    function regenerateImage() {

    async function flagImage() {

      if(!confirm("Report this image as inappropriate?")) return;

      document.body.innerHTML += `<div style="display:flex; align-items:center; justify-content:center; top:0; left:0; right:0; bottom:0; position:fixed; background:#e9e9e9;"><div style="padding:1rem; text-align:center; color:#222222;">Sorry about that. Thank you for helping me improve the algorithm.</div></div>`;

      let title = window.urlHashData.saveTitle;
      let description = window.urlHashData.saveDescription;
      let channel = window.urlHashData.saveChannel;
      
      let result = await fetch(`/api/flagImage?channel=${channel}&subChannel=${encodeURIComponent(localStorage.subChannelName)}&fileExtension=${window.fileExtensionOfResultImage}&title=${encodeURIComponent(title)}&description=${encodeURIComponent(description)}&__cacheBust=${Math.random()}`, {
        method: "POST",
        body: await arrayBufferToBase64(window.arrayBufferOfResultImage),
      }).then(r => r.json()).catch(e => {
        console.error(e);
        return {status: "network_failure"};
      });
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      let bytes = new Uint8Array(buffer);
      let len = bytes.byteLength;
      for(let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return window.btoa(binary);
    }

    async function confirmAsync(message, opts={}) {
      if(!message) message = "Are you sure?"
      return new Promise(resolve => {
        const overlay = Object.assign(document.createElement("div"), { tabIndex: 0 });
        overlay.style.cssText = `position:fixed; inset:0; z-index:9999; display:grid;place-items:center;background-color:rgba(0,0,0,.65);font:16px/1.4 system-ui`;
        overlay.innerHTML = `<div style="text-align:left !important; box-sizing:border-box;max-width:min(95vw, 450px);padding:15px;border-radius:8px;background-color:light-dark(#fff,#222);color:light-dark(#000,#fff);box-shadow:0 2px 8px rgba(0,0,0,.2);">
          <p style="margin:0 0 20px;white-space:pre-wrap;">${message.replace(/[<>&]/g, m => ({"<":"&lt;","&":"&amp;",">":"&gt;"}[m]))}</p>
          <div style="display:flex;justify-content:flex-end;gap:8px;">
            <button ${opts.hideCancelButton ? "hidden" : ""} style="padding:6px 16px;border:1px solid light-dark(#ccc,#555);border-radius:6px;background-color:light-dark(#f6f6f6,#333);color:inherit;cursor:pointer;">Cancel</button>
            <button autofocus style="padding:6px 16px;border:none;border-radius:6px;background-color:light-dark(#1677ff,#2b87ff);color:#fff;cursor:pointer;">Okay</button>
          </div>
        </div>`;
        const [cancelBtn, okBtn] = overlay.querySelectorAll("button");
        const finish = val => { overlay.remove(); resolve(val); };
        cancelBtn.onclick = () => finish(false);
        okBtn.onclick = () => finish(true);
        overlay.onkeydown = e => {
          if (e.key === "Escape") finish(false);
          else if (e.key === "Enter") finish(true);
        };
        document.body.append(overlay);
        overlay.focus({ preventScroll: true }); // enables Esc handling immediately
      });
    }

    let currentlySaving = false;
    async function saveImageToGallery() {

      if(Date.now() > 1774698022864 && !localStorage.saveImageToGalleryCount && (!localStorage.subChannelName || localStorage.subChannelName === "public")) {
        let okay = window.confirm("This image will be permanently saved to the public gallery where anyone can view it. Continue?");
        if(!okay) return
      }

      if(currentlySaving) return;
      currentlySaving = true;

      localStorage.saveImageToGalleryCount = Number(localStorage.saveImageToGalleryCount || "0") + 1;
      
      let originalSaveButtonInnerHtml = saveToGalleryButtonEl.innerHTML;
      saveToGalleryButtonEl.innerHTML = "⌛ Saving...";
      
      // let urlObj = new URL(window.location.href);
      // let urlHashData = JSON.parse(decodeURIComponent(urlObj.hash.slice(1)));
      
      let title = window.urlHashData.saveTitle;
      let description = window.urlHashData.saveDescription;
      let channel = window.urlHashData.saveChannel;
      
      let result = await fetch(`/api/saveImageToGallery?channel=${channel}&subChannel=${encodeURIComponent(localStorage.subChannelName)}&fileExtension=${window.fileExtensionOfResultImage}&title=${encodeURIComponent(title)}&description=${encodeURIComponent(description)}&__cacheBust=${Math.random()}`, {
        method: "POST",
        body: await arrayBufferToBase64(window.arrayBufferOfResultImage),
      }).then(r => r.json()).catch(e => {
        console.error(e);
        return {status: "network_failure"};
      });

      if(result.status === "success") {
        localStorage.publicUserId = result.publicUserId;
        if(result.warn === 1) confirmAsync(`You may need to explicitly state that relevant characters in your prompt are 18 or older, since the gallery's more intensive moderation system can make mistakes if there is ambiguity.`, {hideCancelButton:true});
        saveToGalleryButtonEl.innerHTML = "✅ Saved.";
        saveToGalleryButtonEl.style.opacity = "0.5";
        // saveToGalleryButtonEl.style.background = "transparent";
        window.parent.postMessage({savedImageToGallerySignal:true}, "*");
        if(window.mainBroadcastChannel) { // old browsers don't support broadcastchannel
          window.mainBroadcastChannel.postMessage({type:"imageSavedToSubChannel", channelName:channel, subChannelName:localStorage.subChannelName});
        } else {
          // todo: maybe implement a fallback for broadcast channels, tho it's low priority
          // let imageSavedToSubChannelNotifiers;
          // try { imageSavedToSubChannelNotifiers = JSON.parse(localStorage.imageSavedToSubChannelNotifiers || "[]"); } catch(e) {}
          // if(!imageSavedToSubChannelNotifiers) imageSavedToSubChannelNotifiers = [];
          // imageSavedToSubChannelNotifiers.push({time:Date.now(), channelName:channel, subChannelName:localStorage.subChannelName});
        }
      } else {
        saveToGalleryButtonEl.innerHTML = "Error: "+result.status.replace(/_/g, " ");
      }
      setTimeout(() => {
        saveToGalleryButtonEl.innerHTML = originalSaveButtonInnerHtml;
        saveToGalleryButtonEl.style.opacity = "1";
      }, 2000);
      currentlySaving = false;
    }
    function saveImageToComputer() {
      let el = document.createElement("a");
      el.href = resultImgEl.src;
      let extension = resultImgEl.src.slice(0, resultImgEl.src.indexOf(";")).split("/").pop();
      el.download = window.urlHashData.prompt.replace(/[^a-zA-Z0-9_\-]+/g, " ").trim().replaceAll(" ", "_").slice(0, 30)+"."+extension;
      el.style.display = 'none';
      document.body.appendChild(el);
      el.click();
      document.body.removeChild(el);
    }
    function sendOpenGallerySignal() {
      window.parent.postMessage({openGallerySignal:true, subChannelName:localStorage.subChannelName}, "*");
    }
  </script>

  <script>
    window.urlHashData = JSON.parse(decodeURIComponent(new URL(window.location.href).hash.slice(1)));
    //window.requestId = new URL(window.location.href).searchParams.get("requestId") || Math.random().toString();
    window.requestId = window.urlHashData.requestId || Math.random().toString();

    
    try { // try/catch is just because it's new code
      if(window.urlHashData.hideGalleryButtons) {
        saveToGalleryWrapperEl.style.display = "none";
        openGalleryWrapperEl.style.display = "none";
      }
    } catch(e) { console.error(e); }

    let colorScheme;
    try {
      colorScheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? "dark" : "light";
      if(window.urlHashData.forceColorScheme !== undefined) {
        colorScheme = window.urlHashData.forceColorScheme;
      }
      if(colorScheme === "dark") {
        document.body.style.colorScheme = "dark";
        document.body.style.color = "#d8d4cf";
        document.body.style.backgroundColor = "#262626";
        document.documentElement.style.setProperty('--box-color', '#232323');
        document.documentElement.style.setProperty('--box-color-hover', '#141414');
      } else {
        document.body.style.colorScheme = "light";
        document.body.style.color = "black";
        document.body.style.backgroundColor = "#e9e9e9";
        document.documentElement.style.setProperty('--box-color', 'white');
        document.documentElement.style.setProperty('--box-color-hover', '#ececec');
      }
    } catch(e) { 
      console.error("Problem with new dark mode stuff:", e);
    }

    async function resizeAndCenterCrop(input, width, height) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      let bitmap;

      if (input instanceof HTMLImageElement || input instanceof Blob || input instanceof File) {
        bitmap = await createImageBitmap(input);
      } else if (typeof input === 'string') {
        const blob = await fetch(input).then(r => r.blob());
        bitmap = await createImageBitmap(blob);
      } else if (input instanceof HTMLCanvasElement) {
        const ctx = input.getContext('2d');
        bitmap = await createImageBitmap(ctx.getImageData(0, 0, input.width, input.height));
      }

      const aspectRatio = bitmap.width / bitmap.height;
      const targetAspectRatio = width / height;
      let sourceX = 0, sourceY = 0, sourceWidth = bitmap.width, sourceHeight = bitmap.height;

      if (aspectRatio > targetAspectRatio) {
        sourceWidth = bitmap.height * targetAspectRatio;
        sourceX = (bitmap.width - sourceWidth) / 2;
      } else {
        sourceHeight = bitmap.width / targetAspectRatio;
        sourceY = (bitmap.height - sourceHeight) / 2;
      }

      ctx.drawImage(bitmap, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);
      return canvas.toDataURL("image/jpeg");
    }

    function blobToBase64(blob) {

    async function removeBackground(imageUrl) { // can be data url or normal URL
      if (!removeBackground.transformers) {
        const transformers = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3');
        transformers.env.allowLocalModels = false;
        transformers.env.backends.onnx.wasm.proxy = true;
        removeBackground.transformers = transformers;
      }
      
      const { AutoModel, AutoProcessor, RawImage } = removeBackground.transformers;
      if (!removeBackground.model || !removeBackground.processor) {
        removeBackground.model = await AutoModel.from_pretrained('briaai/RMBG-1.4', {
          config: { model_type: 'custom' },
        });
        
        removeBackground.processor = await AutoProcessor.from_pretrained('briaai/RMBG-1.4', {
          config: {
            do_normalize: true,
            do_pad: false,
            do_rescale: true,
            do_resize: true,
            image_mean: [0.5, 0.5, 0.5],
            feature_extractor_type: "ImageFeatureExtractor",
            image_std: [1, 1, 1],
            resample: 2,
            rescale_factor: 0.00392156862745098,
            size: { width: 1024, height: 1024 },
          }
        });
      }
      
      const image = await RawImage.fromURL(imageUrl);
      const { pixel_values } = await removeBackground.processor(image);
      const { output } = await removeBackground.model({ input: pixel_values });
      const mask = await RawImage.fromTensor(output[0].mul(255).to('uint8')).resize(image.width, image.height);
      
      const canvas = document.createElement('canvas');
      canvas.width = image.width;
      canvas.height = image.height;
      const ctx = canvas.getContext('2d');
      
      // Draw original image output to canvas
      ctx.drawImage(image.toCanvas(), 0, 0);
      
      // Update alpha channel
      const pixelData = ctx.getImageData(0, 0, image.width, image.height);
      for (let i = 0; i < mask.data.length; ++i) {
        pixelData.data[4 * i + 3] = mask.data[i];
      }
      ctx.putImageData(pixelData, 0, 0);
      
      return canvas.toDataURL('image/png');
    }

        // for some reason `top:0;` style is required on old safari versions. 
        outputEl.innerHTML = `<img id="resultImgEl" style="width:100%; height:100%; position:fixed; top:0;" title="prompt=${result.prompt.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}\nnegativePrompt=${result.negativePrompt.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}\nguidanceScale=${result.guidanceScale}\nseed=${seedUsed}" src="${dataUrl}"/>`;
        
        try {

        } catch(e) {

        try {

            if(isNaN(okayToShowNsfwUntil)) {
              localStorage.okayToShowNsfwUntil = "";
              okayToShowNsfwUntil = 0;
            }
            okayToShowNsfw = Date.now() < okayToShowNsfwUntil;
          }
          if(result.maybeNsfw && !okayToShowNsfw) {
            let tmp = document.createElement("div");
            tmp.innerHTML = `
              <div id="contentGuardEl" style="z-index:10000; position:fixed; background:var(--box-color); top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                <div id="contentGuardMessageEl">
                  <div style="padding:1rem; font-size:85%;">

                    <p style="${window.innerHeight < 300 ? "display:none;" : ""}">This generated image <u>may</u> contain themes that are not appropriate for all audience, such as graphic violence, or sexual content. This can happen due to the randomness and biases of the AI model, or specific words in your prompt.</p>
                  </div>
                  <button onclick="contentGuardMessageEl.style.display='none'; contentGuardSettingsEl.style.display=''; " style="font-size:80%;cursor:pointer;display:block;margin:0 auto; color:white; background: #1f67ab;border: 1px solid #2778c4;border-radius: 2px;padding: 0.25rem 0.5rem;">⚙️ change settings</button>

                  <div style="padding:1rem; font-size:85%;">

                      <option value="0">✅ Enable PG-13 filter</option>

                      <option value="${1000*60*60*24*365*10}">⚠️ Disable filter permanently</option>  
                    </select>
                    <div id="contentGuardOver18AreaEl" style="display:flex; opacity:0.3; pointer-events:none; margin-top:1rem; gap: 0.25rem; align-items: center; cursor: pointer;">
                      <input id="contentGuardOver18CheckboxEl" type="checkbox"> <span onclick="contentGuardOver18CheckboxEl.click();" style="user-select:none;">I am over 18 years old</span>
                    </div>
                    <button onclick="if(Number(contentGuardSettingsSelectEl.value) > 0 && !contentGuardOver18CheckboxEl.checked) { alert('Sorry, you must be over 18 to disable the filter. If you are, click the checkbox.'); } else { localStorage.okayToShowNsfwUntil=Date.now()+Number(contentGuardSettingsSelectEl.value); contentGuardMessageEl.style.display=''; contentGuardSettingsEl.style.display='none'; updateContentGuardVisibility(true); }" style="cursor:pointer; display:block; margin:1rem auto;">save</button>
                  </div>
                </div>
                ${navigator.userAgent.indexOf('SamsungBrowser') !== -1 ? `<div style="font-size: 80%; padding: 1rem;"><b style="color: #ef0000;">Note</b>: For some reason the <b>Samsung Internet</b> browser crashes when changing settings. Please install and use Chrome, Edge, or Firefox from your phone's app store.</div>` : ""}

            document.body.appendChild(tmp.firstElementChild);

        } catch(e) {
          if(document.querySelector("#contentGuardEl")) {
            document.querySelector("#contentGuardEl").remove();
          }
          console.error(e);
        }

        // A hack to fix weird bug in Windows causing iframe rendering to sometimes not update once image is done (stays on "Processing" frame, but weirdly with spinner still going):
        await new Promise(r => setTimeout(r, 10));
        await new Promise(r => requestAnimationFrame(r));
        await new Promise(r => requestAnimationFrame(r));
        
        waitingEl.style.display = "none";
        outputEl.style.display = "flex";
        if(Number(seed) === -1) reloadButtonEl.style.display = "block";
        heartButtonEl.style.display = "block";
        flagButtonEl.style.display = "flex";
        infoButtonEl.style.display = "flex";

        // A hack to fix weird bug in Windows causing iframe rendering to sometimes not update once image is done (stays on "Processing" frame, but weirdly with spinner still going):
        await new Promise(r => setTimeout(r, 10));
        await new Promise(r => requestAnimationFrame(r));
        await new Promise(r => requestAnimationFrame(r));

        // EDIT: I think it's a bad idea to do it in the embed, because unless transformers.js uses shared workers or whatever, it would load the model many times. Need to think about this more.
        // TODO: Implement this server-side.
        // if(window.urlHashData.removeBackground) {
        //   let pngDataUrlWithBgRemoved = await removeBackground(dataUrl).catch(console.error);
        //   if(pngDataUrlWithBgRemoved) dataUrl = pngDataUrlWithBgRemoved;
        // }

        window.parent.postMessage({type:"finished", dataUrl, seedUsed, id:window.urlHashData.iframeId}, '*');
        
        // if(prompt !== result.prompt || seed !== result.seed) {
        //   promptMismatchWarningEl.style.display = "block";
        //   setTimeout(() => promptMismatchWarningEl.style.display="none", 5*1000);
        // }
        return true;
      } else if(result.status === "waiting_for_prev_request_to_finish") { 
        waitingContentEl.innerHTML = `${spinnerSvgText} Waiting...`;
        await new Promise(r => setTimeout(r, 500));
        
        // if current thread is busy, and there's another one that hasn't been used in a while, switch to that one:
        let didSwitchThreads = false;
        let currentThreadTimeSinceActive = Date.now() - (Number(localStorage[`threadLastActiveTime-${window.thread}`] || 0) || 0);
        if(currentThreadTimeSinceActive < 2000) {
          let leastRecentlyActiveThreadTime = Infinity;
          let leastRecentlyActiveThread = 0;
          for(let i = 0; i < maxThreadsPerUser; i++) {
            let time = Number(localStorage[`threadLastActiveTime-${i}`] || 0) || 0;
            if(time < leastRecentlyActiveThread) {
              leastRecentlyActiveThreadTime = time;
              leastRecentlyActiveThread = i;
            }
          }
          if(Date.now()-leastRecentlyActiveThreadTime > 4000) {
            console.debug(`Image gen: Switching from thread=${window.thread} (active ${currentThreadTimeSinceActive}ms ago) to thread=${leastRecentlyActiveThread} (active ${Date.now()-leastRecentlyActiveThreadTime}ms ago)`);
            window.thread = leastRecentlyActiveThread;
            localStorage[`threadLastActiveTime-${window.thread}`] = Date.now();
            didSwitchThreads = true;
          }
        }

        // otherwise just wait for the current thread:
        if(!didSwitchThreads) {
          window.waitingForExistingGenerationRequest = true;
          // If there are many embeds waiting, we don't want them all hammering the server, so we communicate to the others with polling so only one makes the request.
          while(1) {
            let time = Number(localStorage[`threadLastKnownWaitingForExistingRequestTime-userKey-${window.thread}`]);
            if(isNaN(time) || time < Date.now()-2000) break;
            await new Promise(r => setTimeout(r, 1000));
          }
          // if an embed reaches this point, then it's the "next in line", and will inform the others that it's waiting:
          localStorage[`threadLastKnownWaitingForExistingRequestTime-userKey-${window.thread}`] = Date.now();
          let broadcastInterval = setInterval(() => { localStorage[`threadLastKnownWaitingForExistingRequestTime-userKey-${window.thread}`]=Date.now(); }, 1000);
          let fetchOptions = {};
          if(window.AbortSignal && AbortSignal.timeout) fetchOptions.signal = AbortSignal.timeout(18000);
          await fetch(`/api/awaitExistingGenerationRequest?userKey=${localStorage[`userKey-${window.thread}`]}&__cacheBust=${Math.random()}`, fetchOptions).then(r => r.json()).catch(e => {
            if(e.name !== "TimeoutError") console.error(e);
            return {status:"fetch_failure"};
          });
          clearInterval(broadcastInterval);
          window.waitingForExistingGenerationRequest = false;
        }

        await new Promise(r => setTimeout(r, 200));
        return await joinQueue(inputs);

      } else if(result.status === "invalid_ad_access_code") {
        let oldAccessCode = localStorage.adAccessCode;
        await updateAdAccessCode().catch(console.error);
        if(localStorage.adAccessCode === oldAccessCode) {
          window.failedDueToInvalidAccessCode = true;
          waitingContentEl.innerHTML = `Failed: Invalid access code.`;
          waitingSubtitleEl.innerHTML = `<span style="opacity:0.5;">(Access code failure. Ad blockers <u>may</u> cause this error, and will result in slower image generation. Please try refreshing the page, or report this at lemmy.world/c/perchance if that doesn't fix it.)</span>`;
          await new Promise(r => setTimeout(r, 10000));
        }
        return false;
      } else if(result.status === "gen_failure" && result.type === 1) {
        await new Promise(r => setTimeout(r, 3000));
        return await joinQueue(inputs);
      } else {
        console.error(result);
        waitingContentEl.innerHTML = `Failed: ${result.status.replace(/_/g, " ")}. Retrying...`;
        if(result.status !== "stale_request") {
          localStorage[`recentlyVerified-${window.thread}`] = "";
          if(!(await alreadyVerified())) {
            localStorage[`userKey-${window.thread}`] = "";
          }
        }
        await new Promise(r => setTimeout(r, 3000));
        return false;
        
      }
    }

    function updateContentGuardVisibility(broadcastToOtherEmbeds=false) {
      if(document.querySelector("#contentGuardEl")) {
        let okayToShowNsfw = false;
        if(localStorage.okayToShowNsfwUntil) {
          let okayToShowNsfwUntil = Number(localStorage.okayToShowNsfwUntil);
          if(isNaN(okayToShowNsfwUntil)) {
            localStorage.okayToShowNsfwUntil = "";
            okayToShowNsfwUntil = 0;
          }
          okayToShowNsfw = Date.now() < okayToShowNsfwUntil;
        }
        if(okayToShowNsfw) {
          document.querySelector("#contentGuardEl").remove();
        }
        try {
          if(broadcastToOtherEmbeds) {
            window.mainBroadcastChannel.postMessage({type:"updateContentGuardVisibility"});
          }
        } catch(e) {
          console.error(e);
        }
      }
    }

    try {
      window.mainBroadcastChannel.addEventListener("message", event => {
        if(event.data.type === "updateContentGuardVisibility") {
          updateContentGuardVisibility();
        }
      });
    } catch(e) {
      console.error(e);
    }

    // when this embed is deleted/reloaded, we save its id so we can (in the setInterval below) tell the server that it can expire the image
    window.addEventListener("unload", async () => {
      if(window.finishedGeneration && window.imageIdOfResultImage) {
        if(!localStorage.recentlyDiscardedImageIds) localStorage.recentlyDiscardedImageIds = "";
        localStorage.recentlyDiscardedImageIds += ","+window.imageIdOfResultImage;
      
        let recentlyDiscardedImageIds = localStorage.recentlyDiscardedImageIds.split(",").filter(h => h.trim());
        if(recentlyDiscardedImageIds.length > 10 && (localStorage.lastExpireCanImageIdsRequestTime === undefined || Date.now()-Number(localStorage.lastExpireCanImageIdsRequestTime) > 1000*60)) {
          localStorage.recentlyDiscardedImageIds = "";
          localStorage.lastExpireCanImageIdsRequestTime = Date.now();

          console.debug(`/api/canExpireImageIds`, recentlyDiscardedImageIds.join(","));
          let successfullyQueued = navigator.sendBeacon ? navigator.sendBeacon(`/api/canExpireImageIds`, recentlyDiscardedImageIds.join(",")) : false;
          console.debug(`successfullyQueued:`, successfullyQueued);
        }
      }
    });

    let pageLoadTime = Date.now();
    let consecutiveQueueCheckFailures = 0;
    window.consecutiveNotInQueue = 0;
    (async function() {
      let timeOfLastQueuePosCheck = -1;
      while(1) {
        if(Date.now()-timeOfLastQueuePosCheck < 6000) {
          await new Promise(r => setTimeout(r, 6000)); // must not be too long since it's used as a keepalive
        }
        if(window.finishedGeneration) return;
        if(window.waitingForExistingGenerationRequest) {
          await new Promise(r => setTimeout(r, 500));
          continue; // another embed us using the same thread, so no need to check queue position
        }
        try {
          timeOfLastQueuePosCheck = Date.now();
          await updateQueuePos();
        } catch(e) {
          console.error(e);
        }
      }
    })();
    async function updateQueuePos() {
      if(window.finishedGeneration || !window.startedGeneration) {
        return;
      }
      await new Promise(r => setTimeout(r, Math.random()*500)); // to desync multiple embeds

      let userKey = localStorage[`userKey-${window.thread}`];

      let fetchOptions = {};
      if(window.AbortSignal && AbortSignal.timeout) fetchOptions.signal = AbortSignal.timeout(15000);

      let result = await fetch(`/api/getUserQueuePosition?userKey=${userKey}&requestId=${window.requestId}`, fetchOptions).then(r => r.json());
      
      if(result.status !== "not_in_queue") {
        window.consecutiveNotInQueue = 0;
      }

      if(result.status == "success") {
        if(result.position === 0) {
          waitingContentEl.innerHTML = spinnerSvgText+` Processing...${self.crossOriginIsolated ? " ERR" : ""}`; // this is to ensure that if I accidentally cross-origin isolate this embed, I get a very visible error - can't isolate because IIUC localStorage would not be shared between iframes, and I currently use that feature to prevent multiple embeds from verifying at the same time
        } else {
          waitingContentEl.innerHTML = spinnerSvgText+` Queue: ${result.position}/${result.total}`; 
          if(result.havingTechnicalDifficulties === true) {
            waitingSubtitleEl.innerHTML = "(technical difficulties rn 😔)";
          }
        }
        consecutiveQueueCheckFailures = 0;
      } else if(result.status === "waiting_for_prev_request_to_finish") {
        waitingContentEl.innerHTML = `${spinnerSvgText} Waiting...`;
        await new Promise(r => setTimeout(r, 3000));
      } else if(result.status === "not_in_queue") {
        if(window.finishedGeneration) {
          return;
        }
        if(window.failedDueToInvalidAccessCode) {
          await new Promise(r => setTimeout(r, 1000*5)); // allow time for failure/warning message to show
        }
        window.consecutiveNotInQueue++;
        if(window.consecutiveNotInQueue > 2) {
          waitingContentEl.innerHTML = `${spinnerSvgText} Not in queue...`;   
        } else {
          waitingContentEl.innerHTML = `${spinnerSvgText} Waiting...`;
        }
        if(window.consecutiveNotInQueue >= 4) {
          if(window.finishedGeneration) return;
          await new Promise(r => setTimeout(r, 1000*3));
          if(window.finishedGeneration) return;
          if(window.failedDueToInvalidAccessCode) return; // this reload is handled elsewhere because we need to show user the "turn of ad blocker" message for a while
          window.location.reload();
        }
      } else if(result.status === "invalid_key") {
        if(userKey === localStorage[`userKey-${window.thread}`]) { // in case it has been updated since the request started
          localStorage[`userKey-${window.thread}`] = "";
          // don't reload here, since joinQueue handles the reload for this case
        }
      } else {
        waitingContentEl.innerHTML = `Queue Position: ${result.status.replaceAll("_", " ")}`;
        console.error(result);
        consecutiveQueueCheckFailures++;
        if(consecutiveQueueCheckFailures >= 3) {
          if(window.finishedGeneration) return;
          await new Promise(r => setTimeout(r, 1000*3));
          if(window.finishedGeneration) return;
          else window.location.reload();
        }
      }
    }
  </script>

  <script>
    function createPromptDataCopyModal(textAreas, parentElement) {
      // Create modal container
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--box-color);padding:0.5rem;display:flex;flex-direction:column;position:absolute;top:0;left:0;right: 0;bottom:0; z-index:200;';

      // Create and append text areas
      textAreas.forEach(({ title, content, toggleAppend }) => {
        let textAreaId = "textArea"+Math.random().toString().replace(".", "");

        let label = document.createElement('div');
        let toggleAppendHtml = "";
        if(toggleAppend) {
          toggleAppendHtml = `<span style="display:inline-flex; align-items:center; margin-left:auto;"><input type="checkbox" style="cursor:pointer;" onchange="if(this.checked) { ${textAreaId}.value=this.dataset.originalContent+this.dataset.textToAppend; } else { ${textAreaId}.value=this.dataset.originalContent; }" data-original-content="${content.replace(/"/g, "&quot;").replace(/</g, "&lt;")}" data-text-to-append="${toggleAppend.text.replace(/"/g, "&quot;").replace(/</g, "&lt;")}"><span onclick="let c = this.parentElement.querySelector('input[type=checkbox]'); c.checked=!c.checked; c.onchange({});" style="cursor:pointer;"> ${toggleAppend.label}</span></span>`;
        }
        label.innerHTML = `<div style="margin-bottom:0.125rem; opacity: 0.7; font-size: 80%; display:flex;"><span>${title}</span>${toggleAppendHtml}</div>`;
        label = label.firstElementChild;

        const textArea = document.createElement('textarea');
        textArea.value = content;
        textArea.id = textAreaId;
        textArea.style.cssText = "margin-bottom:0.5rem; flex-grow:1; min-height:2rem;";

        modal.appendChild(label);
        modal.appendChild(textArea);
      });

      // Create close button
      const closeButton = document.createElement('button');
      closeButton.textContent = 'close';
      closeButton.style.cssText = "margin-top:auto; cursor:pointer; min-height:1.75rem;";
      closeButton.addEventListener('click', () => {
        modal.remove();
      });

      // Append close button and modal to parent element
      modal.appendChild(closeButton);
      parentElement.appendChild(modal);

      modal.querySelectorAll("textarea").forEach(el => {
        el.style.maxHeight = "0px";
        el.style.maxHeight = (el.scrollHeight+5)+"px";
      });
    }
  </script>

  <script>
    // track this embed's intersection with the viewport so we can prioritise which embed should get processed next
    let intersectionTester = document.createElement("div");
    intersectionTester.style.cssText = "position:absolute; top:0; bottom:0; right:0; left:0; z-index:1000000; pointer-events:none;";
    document.body.appendChild(intersectionTester);
    
    window.visibilityRatioOfThisIframe = 1; 
    let observer = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        window.visibilityRatioOfThisIframe = entry.intersectionRatio;
      });
    }, {
      threshold: Array.from(new Array(11).keys()).map(t => t / 10), // <-- meaning we get intersection updates for 10% increments in visiblity change
    });
    observer.observe(intersectionTester);
  </script>
